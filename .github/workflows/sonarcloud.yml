name: SonarCloud Analysis

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: EcoBrotes
        run: dotnet sonarscanner begin /k:EcoBrotes /n:EcoBrotes.NET /o:yeiser /d:sonar.token=$env:SONAR_TOKEN /d:sonar.host.url=https://sonarcloud.io /d:sonar.coverage.exclusions="**/*Tests/**/*.cs"

      - name: Build and test with coverage
        working-directory: EcoBrotes
        run: |
          dotnet restore EcoBrotes.sln
          dotnet build EcoBrotes.sln --no-restore
          dotnet test EcoBrotes.sln --no-build --verbosity minimal `
            --collect:"XPlat Code Coverage" `
            /p:CollectCoverage=true `
            /p:CoverletOutputFormat=opencover `
            /p:CoverletOutputDirectory=.

      - name: Find coverage file
        working-directory: EcoBrotes
        run: |
          Write-Host "Searching for coverage files in all subdirectories..."
          $files = Get-ChildItem -Recurse -Filter "*.opencover.xml"
          if ($files.Count -gt 0) {
            foreach ($file in $files) {
              Write-Host "Found: $($file.FullName)"
            }
            Copy-Item -Path $files[0].FullName -Destination "coverage.opencover.xml" -Force
            Write-Host "Copied first coverage file to root"
          } else {
            Write-Host "WARNING: No .opencover.xml files found"
          }

      - name: Verify coverage file exists
        working-directory: EcoBrotes
        run: |
          if (Test-Path "coverage.opencover.xml") { 
            Write-Host "Coverage file found at root"
            $size = (Get-Item "coverage.opencover.xml").Length
            Write-Host "File size: $size bytes"
          } else { 
            Write-Host "Coverage file NOT found at root"
          }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: EcoBrotes/coverage.opencover.xml

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: EcoBrotes
        run: dotnet sonarscanner end /d:sonar.token=$env:SONAR_TOKEN
