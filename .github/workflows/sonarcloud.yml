name: SonarCloud Analysis

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner begin /k:EcoBrotes /n:EcoBrotes.NET /o:yeiser /d:sonar.token=$env:SONAR_TOKEN /d:sonar.host.url=https://sonarcloud.io /d:sonar.coverage.exclusions="**/*Tests/**/*.cs" /d:sonar.coverage.reports.path=coverage/coverage.opencover.xml

      - name: Build and test with coverage
        run: dotnet test EcoBrotes.sln --no-build --verbosity minimal /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutputDirectory=.

      - name: Find and merge coverage files
        run: |
          Write-Host "Searching for coverage files in all subdirectories..."
          $files = Get-ChildItem -Recurse -Filter "*.opencover.xml" -ErrorAction SilentlyContinue
          if ($files.Count -gt 0) {
            foreach ($file in $files) {
              Write-Host "Found: $($file.FullName)"
            }
            Write-Host "Merging coverage files using ReportGenerator..."
            $fileList = ($files | ForEach-Object { $_.FullName }) -join ";"
            dotnet reportgenerator "-reports:$fileList" "-targetdir:coverage" "-reporttypes:Opencover"
            Write-Host "Coverage files merged"
          } else {
            Write-Host "WARNING: No .opencover.xml files found"
          }

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token=$env:SONAR_TOKEN
