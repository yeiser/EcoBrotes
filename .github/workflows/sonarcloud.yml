name: SonarCloud Analysis

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner begin /k:EcoBrotes /n:EcoBrotes.NET /o:yeiser /d:sonar.token=$env:SONAR_TOKEN /d:sonar.host.url=https://sonarcloud.io /d:sonar.coverage.exclusions="**/*Tests/**/*.cs"

      - name: Build and test with coverage
        run: dotnet test EcoBrotes.sln --no-build --verbosity minimal /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutputDirectory=.

      - name: Find coverage files
        run: |
          Write-Host "Searching for coverage files in all subdirectories..."
          $files = Get-ChildItem -Recurse -Filter "*.opencover.xml" -ErrorAction SilentlyContinue
          if ($files.Count -gt 0) {
            foreach ($file in $files) {
              Write-Host "Found: $($file.FullName)"
            }
            Copy-Item -Path $files[0].FullName -Destination "coverage.opencover.xml" -Force
            Write-Host "Copied first coverage file to root"
          } else {
            Write-Host "WARNING: No .opencover.xml files found"
          }

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token=$env:SONAR_TOKEN
