name: SonarCloud Analysis

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Install Coverlet
        run: dotnet tool install --global coverlet.console

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: EcoBrotes
        run: dotnet sonarscanner begin /k:EcoBrotes /n:EcoBrotes.NET /o:yeiser /d:sonar.token=$env:SONAR_TOKEN /d:sonar.host.url=https://sonarcloud.io /d:sonar.coverage.exclusions="**/*Tests/**/*.cs"

      - name: Build and test with coverage
        working-directory: EcoBrotes
        run: |
          dotnet restore EcoBrotes.sln
          dotnet build EcoBrotes.sln --no-restore
          dotnet test EcoBrotes.sln --no-build --verbosity minimal /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput=coverage

      - name: Verify coverage file exists
        working-directory: EcoBrotes
        run: |
          Write-Host "Searching for coverage files..."
          Get-ChildItem -Recurse -Filter "coverage.opencover.xml" | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          if (Test-Path "coverage.opencover.xml") { Write-Host "Coverage file found at root" } else { Write-Host "Coverage file NOT found at root" }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.opencover.xml

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: EcoBrotes
        run: dotnet sonarscanner end /d:sonar.token=$env:SONAR_TOKEN
