name: SonarCloud Analysis

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: dotnet sonarscanner begin /d:sonar.projectKey=EcoBrotes /d:sonar.organization=yeiser /d:sonar.token=%SONAR_TOKEN% /d:sonar.host.url=%SONAR_HOST_URL% /d:sonar.projectName=EcoBrotes.NET

      - name: Build and test
        run: |
          dotnet restore EcoBrotes.sln
          dotnet build EcoBrotes.sln --no-restore
          dotnet test EcoBrotes.sln --no-build --verbosity minimal

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token=%SONAR_TOKEN%