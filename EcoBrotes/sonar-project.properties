# =====================================================
#   SonarCloud Configuration for EcoBrotes.NET
# =====================================================

# Required metadata
sonar.projectKey=EcoBrotes
sonar.organization=yeiser
sonar.projectName=EcoBrotes.NET
sonar.projectVersion=1.0.0

# Project description
sonar.description=EcoBrotes.NET - Clean Architecture with CQRS, EF Core, and PostgreSQL

# Source configuration
sonar.sources=EcoBrotes
sonar.sourceEncoding=UTF-8

# Language
sonar.language=cs
sonar.csharp.file.suffixes=.cs
sonar.vbnet.file.suffixes=.vb

# Exclusions
sonar.exclusions=**/Migrations/**,**/obj/**,**/bin/**,**/Properties/launchSettings.json,**/*.Designer.cs,**/Program.cs

# Test configuration
sonar.tests=EcoBrotes
sonar.test.inclusions=**/*Tests/**/*.cs,**/*Test/**/*.cs

# Test project coverage
sonar.cs.opencover.reportsPaths=EcoBrotes/**/*.OpenCover.xml
sonar.vsdotnet.reportsPaths=EcoBrotes/**/*.opencover.xml

# Coverage report (using dotnet test coverage)
sonar.cs.vstest.reportsPaths=EcoBrotes/**/*.trx
sonar.coverage.exclusions=**/*Tests/**/*.cs,**/*Test/**/*.cs,**/Program.cs

# C# Project files
sonar.cs.roslyn.ignoreIssues=false

# Pull Request configuration (for GitHub integration)
sonar.pullrequest.provider=GitHub
sonar.pullrequest.github.repository=yeiser/EcoBrotes
