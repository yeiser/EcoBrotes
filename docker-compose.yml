services:
  postgres:
    image: postgres:16-alpine
    container_name: ecobrotess-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecobrotes-net
    restart: unless-stopped

  ecobrotess-api:
    build:
      context: .
      dockerfile: EcoBrotes/EcoBrotes.Api/Dockerfile
    container_name: ecobrotess-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__db=${DB_CONNECTION_STRING}
      - UseInMemoryDatabase=false
      - ASPNETCORE_HTTP_PORTS=8080
    networks:
      - ecobrotes-net
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  ecobrotes-net:
    driver: bridge
